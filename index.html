<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">

<title>Daftar Rombel</title>

<style>

/* SINKRONISASI & RESET BROWSER MOBILE-DESKTOP */
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
    padding: 15px;
    background: #1f161e; /* Nuansa gelap pink tua */
    color: #f0e6ed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.container{
    width: 100%;
    max-width: 1400px;
    margin: auto;
}

.repo-box{
    background: #2d1f2b; /* Box bertema pink gelap */
    border: 1px solid #4a3246;
    border-radius: 12px;
    padding: 20px;
}

.header-box{
    width: 100%;
    max-width: 900px;
    margin: 0 auto 35px auto;
    padding: 0 10px 25px 10px;
    border-bottom: 1px solid #4a3246;
}

.main-title{
    color: #ff79c6; /* Diperbaiki agar kontras bernuansa pink cerah */
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    line-height: 1.3;
}

.sub-title{
    color: #fcd0ec;
    text-align: center;
    font-size: 20px;
    margin-top: 10px;
    line-height: 1.4;
}

/* RESPONSIVE LAYOUT DENGAN GRID */
.content-wrapper{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: start;
}

.column-box{
    background: #382635;
    border: 1px solid #4a3246;
    border-radius: 10px;
    padding: 18px;
    height: fit-content;
}

.section-title{
    color: #ffffff;
    border-bottom: 1px solid #4a3246;
    padding-bottom: 10px;
    margin-bottom: 18px;
    font-size: 20px;
    font-weight: bold;
}

/* CONTAINER PER TINGKAT KELAS */
.grade-box {
    background: #2d1f2b;
    border: 1px solid #4a3246;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 16px;
}

.grade-box:last-child {
    margin-bottom: 0;
}

/* JUDUL TINGKAT KELAS */
.grade-title {
    color: #ff79c6;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 12px;
    border-bottom: 1px dashed #4a3246;
    padding-bottom: 6px;
}

/* OPTIMALISASI TOMBOL UNTUK AKSES SENTUH (TOUCH-FRIENDLY) */
.drive-link, .wa-link {
    display: block;
    width: 100%;
    padding: 14px 16px; /* Padding vertikal ditambah untuk kenyamanan klik di hp */
    font-size: 15px;
    text-decoration: none;
    text-align: left;
    border-radius: 8px;
    transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent; /* Menghilangkan efek highlight biru di safari/chrome mobile */
}

/* TOMBOL DATA SISWA (BORDER PINK SOFT) */
.drive-link{
    margin-bottom: 12px;
    background: #382635;
    border: 1px solid #ff79c6;
    color: #ffb8e4;
    font-weight: bold;
}

.drive-link:hover, .drive-link:active {
    background: #ff79c6;
    color: #1f161e;
}

/* TOMBOL WA GRUP (BORDER PINK MAWAR/ROSE) */
.wa-link{
    margin-bottom: 8px;
    background: #382635;
    border: 1px solid #ff55bb;
    color: white;
}

.wa-link:hover, .wa-link:active {
    background: #ff55bb;
    color: white;
}

.wa-link:last-child {
    margin-bottom: 0;
}

.info-list{
    padding-left: 20px;
}

.info-list li{
    margin-bottom: 12px;
}

footer{
    margin-top: 40px;
    text-align: center;
    color: #b392ac;
    font-size: 14px;
}

/* MEDIA QUERIES UNTUK TAMPILAN TABLET & MOBILE */
@media (max-width: 1024px) {
    .content-wrapper {
        grid-template-columns: 1fr; /* Berubah menjadi 1 kolom penuh di layar tablet/HP */
        gap: 15px;
    }

    .header-box {
        margin-bottom: 25px;
    }

    .main-title {
        font-size: 26px;
    }

    .sub-title {
        font-size: 18px;
    }
}

</style>
</head>

<body>

<div class="container">
<div class="repo-box">

    <div class="header-box">
        <div class="main-title" id="main-title"></div>
        <div class="sub-title" id="sub-title"></div>
    </div>

    <div class="content-wrapper">

        <div class="column-box">
            <div class="section-title">
                📢 INFORMASI PENTING
            </div>
            <ol class="info-list" id="info-container"></ol>
        </div>

        <div class="column-box">
            <div class="section-title">
                📚 KELAS 1 - 3
            </div>
            <div id="kelas13-container"></div>
        </div>

        <div class="column-box">
            <div class="section-title">
                📚 KELAS 4 - 6
            </div>
            <div id="kelas46-container"></div>
        </div>

    </div>

    <footer id="footer-text"></footer>

</div>
</div>

<script>

/* DATA FETCHING & RENDERING */
fetch('header.json')
.then(r => r.json())
.then(data => {
    document.getElementById('main-title').textContent = data.judul;
    document.getElementById('sub-title').innerHTML = data.subjudul + "<br>" + data.tahun;
    document.getElementById('footer-text').textContent = data.footer;
})
.catch(err => console.error("Gagal memuat header.json:", err));

fetch('info.json')
.then(r => r.json())
.then(data => {
    const container = document.getElementById('info-container');
    data.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        container.appendChild(li);
    });
})
.catch(err => console.error("Gagal memuat info.json:", err));

Promise.all([
    fetch('kelas.json').then(r => r.json()),
    fetch('datasiswa.json').then(r => r.json()),
    fetch('wa.json').then(r => r.json())
])
.then(([kelasData, siswaData, waData]) => {

    const kelas13Container = document.getElementById('kelas13-container');
    const kelas46Container = document.getElementById('kelas46-container');

    const kelompokKelas = {};

    // Inisialisasi struktur tingkatan berdasarkan berkas kelas.json baru
    kelasData.forEach(item => {
        kelompokKelas[item.tingkat] = {
            namaJudul: item.nama,
            linkDrive: "",
            listWa: [],
            targetDOM: item.tingkat <= 3 ? kelas13Container : kelas46Container
        };
    });

    // 1. Sinkronisasi tautan berkas data murid (datasiswa.json)
    siswaData.forEach(siswa => {
        const matchKelas = siswa.nama.match(/\d+/);
        if (matchKelas) {
            const nomorKelas = parseInt(matchKelas[0]);
            if (kelompokKelas[nomorKelas] && siswa.url && siswa.url.trim() !== "") {
                kelompokKelas[nomorKelas].linkDrive = siswa.url;
            }
        }
    });

    // 2. Pengelompokan grup WA otomatis (wa.json)
    waData.forEach(wa => {
        const matchWa = wa.nama.match(/\d+/);
        if (matchWa) {
            const nomorKelas = parseInt(matchWa[0]);
            if (kelompokKelas[nomorKelas]) {
                kelompokKelas[nomorKelas].listWa.push({
                    namaWa: wa.nama,
                    urlWa: wa.url
                });
            }
        }
    });

    // 3. Render komponen secara dinamis dan aman
    for (const key in kelompokKelas) {
        if (!kelompokKelas.hasOwnProperty(key)) continue;

        const infoKelas = kelompokKelas[key];

        const gradeBox = document.createElement('div');
        gradeBox.className = 'grade-box';

        // Bagian A: Judul Tingkat Kelas
        const gradeTitle = document.createElement('div');
        gradeTitle.className = 'grade-title';
        gradeTitle.textContent = infoKelas.namaJudul;
        gradeBox.appendChild(gradeTitle);

        // Bagian B: Tombol Data Siswa
        const driveLink = document.createElement('a');
        driveLink.className = 'drive-link';
        driveLink.href = infoKelas.linkDrive ? infoKelas.linkDrive : "https://drive.google.com";
        driveLink.target = '_blank';
        driveLink.rel = 'noopener noreferrer'; // Optimalisasi keamanan saat membuka tab baru
        driveLink.textContent = "📁 Daftar Nama Siswa";
        gradeBox.appendChild(driveLink);

        // Bagian C: Daftar Grup WA Rombel
        infoKelas.listWa.forEach(wa => {
            const waLink = document.createElement('a');
            waLink.className = 'wa-link';
            waLink.href = wa.urlWa;
            waLink.target = '_blank';
            waLink.rel = 'noopener noreferrer';
            waLink.textContent = wa.namaWa;
            gradeBox.appendChild(waLink);
        });

        infoKelas.targetDOM.appendChild(gradeBox);
    }
})
.catch(err => console.error("Gagal memproses berkas relasi data JSON:", err));

</script>

</body>
</html>
