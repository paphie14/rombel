<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Rombel</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:15px;
    background:#0d1117;
    color:#c9d1d9;
    font-family:Arial, Helvetica, sans-serif;
    line-height:1.5;
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
}

.repo-box{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    padding:20px;
}

.header-box{
    width:70%;
    max-width:900px;
    margin:0 auto 35px auto;
    padding:0 20px 25px 20px;
    border-bottom:1px solid #30363d;
}

.main-title{
    /* color:#58a6ff; */
    color:#000000;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    line-height:1.4;
}

.sub-title{
    color:#f0f6fc;
    text-align:center;
    font-size:22px;
    margin-top:10px;
}

/* STRUKTUR GRID UTAMA (KOLOM 1, 2, 3) */
.content-wrapper{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.column-box{
    background:#21262d;
    border:1px solid #30363d;
    border-radius:10px;
    padding:18px;
    height: fit-content;
}

.section-title{
    color:#ffffff;
    border-bottom:1px solid #30363d;
    padding-bottom:10px;
    margin-bottom:18px;
    font-size:22px;
    font-weight:bold;
}

/* CONTAINER PER TINGKAT KELAS DI KOLOM 2 DAN 3 */
.grade-box {
    background:#161b22;
    border:1px solid #30363d;
    border-radius:10px;
    padding:15px;
    margin-bottom:16px;
}

.grade-box:last-child {
    margin-bottom: 0;
}

/* JUDUL TINGKAT KELAS (TEKS BIASA, BUKAN HIPERLINK) */
.grade-title {
    color: #58a6ff;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 12px;
    border-bottom: 1px dashed #30363d;
    padding-bottom: 6px;
}

/* TOMBOL DATA SISWA (BORDER SAMA SEPERTI WA, TAPI WARNA BIRU) */
.drive-link{
    display:block;
    width:100%;
    padding:12px 16px;
    margin-bottom: 12px;

    background:#21262d;
    border:1px solid #2f81f7;
    border-radius:8px;

    color:#58a6ff;
    text-decoration:none;
    text-align:left;
    font-weight: bold;
}

.drive-link:hover{
    background:#2f81f7;
    color:white;
}

/* TOMBOL WA GRUP (WARNA GREEN/HIJAU) */
.wa-link{
    display:block;
    width:100%;
    padding:12px 16px;
    margin-bottom: 8px;

    background:#21262d;
    border:1px solid #198754;
    border-radius:8px;

    color:white;
    text-decoration:none;
    text-align:left;
}

.wa-link:hover{
    background:#198754;
}

.wa-link:last-child {
    margin-bottom: 0;
}

.info-list{
    padding-left:20px;
}

.info-list li{
    margin-bottom:10px;
}

footer{
    margin-top:30px;
    text-align:center;
    color:#8b949e;
}

@media (max-width:900px){
    .content-wrapper{
        grid-template-columns:1fr;
    }
    .header-box{
        width:100%;
    }
    .main-title{
        font-size:24px;
    }
    .sub-title{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="container">
<div class="repo-box">

    <div class="header-box">
        <div class="main-title" id="main-title"></div>
        <div class="sub-title" id="sub-title"></div>
    </div>

    <div class="content-wrapper">

        <div class="column-box">
            <div class="section-title">
                📢 INFORMASI PENTING
            </div>
            <ol class="info-list" id="info-container"></ol>
        </div>

        <div class="column-box">
            <div class="section-title">
                📚 KELAS 1 - 3
            </div>
            <div id="kelas13-container"></div>
        </div>

        <div class="column-box">
            <div class="section-title">
                📚 KELAS 4 - 6
            </div>
            <div id="kelas46-container"></div>
        </div>

    </div>

    <footer id="footer-text"></footer>

</div>
</div>

<script>

/* HEADER */
fetch('header.json')
.then(r => r.json())
.then(data => {
    document.getElementById('main-title').textContent = data.judul;
    document.getElementById('sub-title').innerHTML = data.subjudul + "<br>" + data.tahun;
    document.getElementById('footer-text').textContent = data.footer;
});

/* INFO (KOLOM 1) */
fetch('info.json')
.then(r => r.json())
.then(data => {
    const container = document.getElementById('info-container');
    data.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        container.appendChild(li);
    });
});

/* MEMPROSES 3 DATA JSON SEKALIGUS (kelas.json baru, datasiswa.json, wa.json) */
Promise.all([
    fetch('kelas.json').then(r => r.json()),
    fetch('datasiswa.json').then(r => r.json()),
    fetch('wa.json').then(r => r.json())
])
.then(([kelasData, siswaData, waData]) => {

    const kelas13Container = document.getElementById('kelas13-container');
    const kelas46Container = document.getElementById('kelas46-container');

    // Kerangka penampung kelompok berdasarkan urutan objek di kelas.json yang baru
    const kelompokKelas = {};

    kelasData.forEach(item => {
        kelompokKelas[item.tingkat] = {
            namaJudul: item.nama,
            linkDrive: "",
            listWa: [],
            targetDOM: item.tingkat <= 3 ? kelas13Container : kelas46Container
        };
    });

    // 1. Memetakan URL Drive siswa dari datasiswa.json (eks-kelas.json)
    siswaData.forEach(siswa => {
        const matchKelas = siswa.nama.match(/\d+/);
        if (matchKelas) {
            const nomorKelas = parseInt(matchKelas[0]);
            if (kelompokKelas[nomorKelas] && siswa.url && siswa.url.trim() !== "") {
                kelompokKelas[nomorKelas].linkDrive = siswa.url;
            }
        }
    });

    // 2. Memetakan seluruh data tombol WA dari wa.json
    waData.forEach(wa => {
        const matchWa = wa.nama.match(/\d+/);
        if (matchWa) {
            const nomorKelas = parseInt(matchWa[0]);
            if (kelompokKelas[nomorKelas]) {
                kelompokKelas[nomorKelas].listWa.push({
                    namaWa: wa.nama,
                    urlWa: wa.url
                });
            }
        }
    });

    // 3. Merender struktur baru ke halaman web
    for (const key in kelompokKelas) {
        const infoKelas = kelompokKelas[key];

        const gradeBox = document.createElement('div');
        gradeBox.className = 'grade-box';

        // Bagian A: Membuat Judul Tingkat Kelas (Teks Biasa dari kelas.json baru)
        const gradeTitle = document.createElement('div');
        gradeTitle.className = 'grade-title';
        gradeTitle.textContent = infoKelas.namaJudul;
        gradeBox.appendChild(gradeTitle);

        // Bagian B: Membuat Tombol "Data Siswa" (Hiperlink Biru dari datasiswa.json)
        const driveLink = document.createElement('a');
        driveLink.className = 'drive-link';
        driveLink.href = infoKelas.linkDrive ? infoKelas.linkDrive : "https://drive.google.com";
        driveLink.target = '_blank';
        driveLink.textContent = "📁 Data Siswa";
        gradeBox.appendChild(driveLink);

        // Bagian C: Membuat Jajaran Tombol Grup WA (dari wa.json)
        infoKelas.listWa.forEach(wa => {
            const waLink = document.createElement('a');
            waLink.className = 'wa-link';
            waLink.href = wa.urlWa;
            waLink.target = '_blank';
            waLink.textContent = wa.namaWa;
            gradeBox.appendChild(waLink);
        });

        infoKelas.targetDOM.appendChild(gradeBox);
    }
});

</script>

</body>
</html>
